title: JobRunr Pro Demo
icon: 🏦
subtitle: Learn Background Job Processing Step by Step
slogan: Learn JobRunr Pro by building the backend for a neobank
intro: |
  Welcome to this <strong>JobRunr Pro</strong> demo! In this interactive walkthrough,
  we'll build the backend for a neobank — from customer onboarding to international payments,
  all powered by background jobs.
  <br>
  Through 21 hands-on steps, you'll implement real production patterns with working code you can explore.
  <br>
  <em>No toy examples — just real patterns.</em>

guideIntro: |
  Every serious app runs background jobs. Few run them well. This demo shows how, using a neobank as
  the playground. We picked banking because it stresses everything at once: reliability, auditability,
  scheduling, retries, long-running work.
  <br><br>
  Through 21 hands-on steps, you'll work through real patterns you'd find in production. Each step is
  structured the same way:
  <ul>
    <li><strong>Scenario</strong>: the business context and why the problem matters</li>
    <li><strong>Challenge</strong>: the question you need to answer</li>
    <li><strong>Solution</strong>: how JobRunr Pro solves it <span class="tag is-warning is-light">spoiler</span></li>
    <li><strong>Try It</strong>: hands-on in the running app and JobRunr dashboard</li>
  </ul>
  <strong>Challenge yourself:</strong> A starter template is available for you to implement each step yourself. Each step
  includes the solution description and the actual implementation code. Attempt the challenge first, then
  come back to compare or get unstuck.
  <br><br>
  <span class="tag is-warning is-light">spoiler</span> <em>Note that reading an earlier step may reveal how a later one is solved.</em>

codeRoot: demo-solution/src/main/java
githubLink: https://raw.githubusercontent.com/jobrunr/storyline-demo/refs/heads/main

flow:
  - category: "Getting Started"
    icon: '<i class="fas fa-rocket has-text-primary"></i>'
    description: "Your first background jobs: enqueue, schedule, and recurring tasks."
    steps:
      - ./steps/step-01.yaml
      - ./steps/step-02.yaml
