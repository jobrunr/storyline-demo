title: JobRunr Finance Demo Guide
subtitle: Master Background Job Processing Through Banking
slogan: An interactive guide to JobRunr Pro's powerful features using a real-world banking scenario
intro: |
  Welcome to <strong>JobRunr Finance</strong>, a fictional bank where you'll discover how
  JobRunr Pro powers mission-critical background job processing. Through 12 hands-on steps,
  you'll solve real banking challenges like processing credit card applications, generating
  expense reports, handling payments, and ensuring regulatory compliance.
  <br><br>
  Each step presents a business problem, demonstrates the solution using JobRunr Pro,
  and lets you try it yourself with live code examples and interactive demos.

codeRoot: demo-solution/src/main/java
githubLink: https://github.com/jobrunr/storyline-demo

