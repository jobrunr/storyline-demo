title: "Fair Play"
estimatedTime: PT4M

scenario: |
  Enterprise customers pay 10x more than Pro customers, but their jobs 
  are processed at the same rate. They expect premium service.
  <br><br>
  We need to process more jobs for paying customers while still being fair to everyone.

challenge: |
  How do we process more jobs for paying customers while still being fair to everyone?

solution: |
  Use <strong>Dynamic Queues with Weighted Round-Robin</strong>:
  <br><br>
  <pre class="p-0 m-0">
  <code class="language-properties hljs">
  # In application.properties
  jobrunr.jobs.dynamic-queue.weighted-round-robin.label-prefix=customer:
  jobrunr.jobs.dynamic-queue.weighted-round-robin.queues.ENTERPRISE=5
  jobrunr.jobs.dynamic-queue.weighted-round-robin.queues.PRO=1
  </code>
  </pre>
  <br>
  Enterprise customers get 5 jobs processed for every 1 Pro customer job.
  No one gets starved, but VIPs get VIP treatment!

codeReferences:
  - org/jobrunr/storylinedemo/payment/PaymentService.java?focus=L36-L41

tryIt: |
  Trigger payments for both ENTERPRISE and PRO customers.
  Watch Enterprise jobs complete 5x faster on average!

dashboardUrl: http://localhost:8080/dashboard/jobs

learnMore: https://www.jobrunr.io/en/documentation/pro/dynamic-queues/
