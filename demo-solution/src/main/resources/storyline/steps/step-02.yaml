title: Cancelling Existing Jobs and Naming Jobs
icon: 📊
estimatedTime: PT3M

challenge: |
  As soon as the credit card is activated, the reminder email must not be sent anymore. 
  And, to make things easier in the dashboard, we will name the job and add the customer's name and credit card number.

solution: |
  Using the JobScheduler, we can mark the existing job as not applicable. 
  Thanks to the @Job Annotation, we can name the job with the customer's name and credit card number.

tryIt: |
  Activate the credit card and see the scheduled job change to state <code>NOT_APPLICABLE</code>. It will be deleted automatically after 3 days.

codeReferences:
  - org/jobrunr/storylinedemo/creditcards/CreditCardService.java?focus=L42-L50
  - org/jobrunr/storylinedemo/creditcards/events/listeners/CancelScheduledEmailOnCreditCardActivated.java?focus=L21-L29
tryItUrl: /credit-cards/activate
dashboardUrl: http://localhost:8080/dashboard/jobs?state=NOT_APPLICABLE
