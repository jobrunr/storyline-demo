title: "VIP Treatment"
icon: ⚡
estimatedTime: PT4M

scenario: |
  The job queue has 10,000 monthly statements, but a customer just made 
  a payment that needs to be processed immediately.
  <br><br>
  Payments are revenue. Reports can wait. We need a way to prioritize.

challenge: |
  How do we ensure critical jobs jump the queue and get processed immediately?

solution: |
  Use <strong>Priority Queues</strong> to define job importance:
  <br><br>
  <pre>
  @Job(queue = "high-prio")
  public void processPayment(Payment payment) { ... }
  
  @Job(queue = "low-prio")
  public void generateReport() { ... }
  </pre>
  <br>
  Configure the queues in order of priority. JobRunr always processes higher-priority 
  queues first, but still processes low-priority jobs to prevent starvation.

codeReferences:
  - org/jobrunr/storylinedemo/payment/PaymentService.java?focus=L26-L29

tryIt: |
  1. Trigger 1000 expense reports (low priority)
  2. Make a payment (high priority)
  3. Watch the payment complete immediately despite the backlog!

tryItUrl: /bulk-generate-expenses
dashboardUrl: http://localhost:8080/dashboard/jobs?queue=high-prio

learnMore: https://www.jobrunr.io/en/documentation/pro/priority-queues/
