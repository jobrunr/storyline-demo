title: "Cross-Border Payments"
icon: 🌍
estimatedTime: PT5M

scenario: |
  Cross-border payments require special compliance certifications that 
  only certain servers have. Domestic servers cannot process international 
  payments — it's a regulatory requirement.
  <br><br>
  We need to route specific jobs to specific servers based on their capabilities.

challenge: |
  How do we route specific jobs to specific servers based on their capabilities?

solution: |
  Use <strong>Server Tags</strong> to match jobs with capable servers:
  <br><br>
  <pre class="p-0 m-0">
  <code class="language-java hljs">
  // Tag the job
  jobScheduler.create(aJob()
      .withServerTag(payment.getRegion())  // "international" or "national"
      .withDetails(() -> processPayment(payment)));

  // In application.properties
  jobrunr.background-job-server.tags=national  // This server handles national only
  </code>
  </pre>
  <br>
  Start a second server with <code>tags=international</code> to handle cross-border payments!

codeReferences:
  - org/jobrunr/storylinedemo/payment/PaymentService.java?focus=L36-L42

tryIt: |
  1. Process payments (some are international, some national)
  2. Watch national payments process immediately
  3. International payments wait in SCHEDULED until you start the international server:
  <br><br>
  <code>./gradlew :demo-solution:bootRun --args='--server.port=8081 --jobrunr.dashboard.enabled=false --jobrunr.background-job-server.tags=international'</code>

dashboardUrl: http://localhost:8080/dashboard/servers

learnMore: https://www.jobrunr.io/en/documentation/pro/server-tags/
