title: Your First Jobs - New Customer Onboarding
icon: 🎯
estimatedTime: PT2M

challenge: |
  When customers order a credit card, we need to create the card immediately AND send a reminder
  email in 7 days if they haven't activated it.

solution: |
  Open the <code>CreditCardService.java</code> file and implement the method responsible for creating a credit card using background jobs.
  
  Make sure to <a href="https://www.jobrunr.io/en/documentation/background-methods/enqueueing-jobs/" target="_blank">enqueue a job</a> to create the actual credit card
  and to <a href="https://www.jobrunr.io/en/documentation/background-methods/scheduling-jobs/">schedule a job</a> to send a reminder email in 7 days.

tryIt: |
  After implementing the <code>CreditCardService.java</code>, you can now register a credit card and watch JobRunr handle both the immediate creation and the scheduled reminder.

codeReferences:
  - org/jobrunr/storylinedemo/creditcards/CreditCardService.java?focus=L27-L30
  - org/jobrunr/storylinedemo/creditcards/events/listeners/ScheduleEmailOnCreditCardRegistered.java?focus=L27-L32
tryItUrl: /credit-cards/register
dashboardUrl: http://localhost:8080/dashboard/jobs?state=SUCCEEDED
