title: "Debug Like a Detective"
icon: 🔍
estimatedTime: PT5M

scenario: |
  A payment failed. The customer says they submitted it, the job says it ran,
  but the government API says they never received it.
  <br><br>
  We need to trace the entire journey: web request → job → external API.

challenge: |
  How do we debug issues that span multiple services and background jobs?

solution: |
  JobRunr Pro integrates with <strong>distributed tracing</strong> via OpenTelemetry:
  <br><br>
  <pre class="p-0 m-0">
  <code class="language-properties hljs">
  # In application.properties
  management.tracing.sampling.probability=1.0
  management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
  jobrunr.jobs.metrics.otel-observability.enabled=true
  </code>
  </pre>
  <br>
  Each job carries the trace context, so you can follow a request from 
  the web endpoint through job processing to external API calls.
  <br><br>
  View traces in Jaeger to see the complete picture!

codeReferences:
  - org/jobrunr/storylinedemo/payment/PaymentService.java?focus=L83-L88

tryIt: |
  1. Make a payment that calls the government API
  2. Open Jaeger: <a href="http://localhost:16686" target="_blank">http://localhost:16686</a>
  3. Search for traces with service "storyline-demo"
  4. Follow the trace through all services!

dashboardUrl: http://localhost:16686

learnMore: https://www.jobrunr.io/en/documentation/pro/observability/
