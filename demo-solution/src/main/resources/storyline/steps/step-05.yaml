title: Idempotency and Reentrancy - Run methods only once
icon: 🔄
estimatedTime: PT4M

challenge: |
  Some jobs perform irreversible operations (like charging a credit card or sending an email).
  When jobs fail and retry, we need to ensure these operations don't happen multiple times!

solution: |
  Use `JobContext.runStepOnce("step-name", () -> yourLogic)` to mark critical sections.
  JobRunr remembers completed steps, so retries skip already-successful operations.

tryIt: |
  Trigger expense reports and observe how failed jobs retry without duplicating completed steps.

dashboardLink: http://localhost:8080/dashboard/jobs?state=FAILED

codeReference: expenses/ExpensesService.java#generateExpenseReportFor
