title: Recurring Jobs - Monthly Credit Card Statement Reports
icon: 📊
estimatedTime: PT3M

challenge: |
  All customers need monthly credit card statement reports generated automatically on the 1st of every month.
  Manual generation is error-prone and wastes time.

solution: |
  Using the <code>@Recurring</code> annotation, we can set up recurring jobs with cron expressions. 
  JobRunr ensures the job runs exactly once per schedule, even if the server restarts.

tryIt: |
  Trigger the monthly report generation via the dashboard and see it scheduled for the next month automatically.

codeReference: org/jobrunr/storylinedemo/creditcards/CreditCardStatementService.java?focus=L25-L28
dashboardUrl: http://localhost:8080/dashboard/recurring-jobs
