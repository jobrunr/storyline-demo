title: "Batch Processing"
estimatedTime: PT4M

scenario: |
  At month-end, we need to generate individual statements for 10,000 cardholders.
  Only after ALL statements are ready should we create the summary report.
  <br><br>
  If any statement fails, we shouldn't create a partial summary.

challenge: |
  How do we coordinate thousands of jobs and trigger a follow-up action only when they ALL succeed?

solution: |
  Use JobRunr's <strong>Batch</strong> feature with <code>continueWith()</code>:
  <br><br>
  <pre class="p-0 m-0">
  <code class="language-java hljs">
  jobScheduler
      .startBatch(this::generateAllStatements)
      .continueWith(this::createSummaryReport);
  </code></pre>
  <br>
  All child jobs start in <code>AWAITING</code> state. The child jobs start processing only after all of them are created.
  If the parent fails to create the child jobs, all children are rolled back atomically.
  The continuation only runs when ALL children succeed.

codeReferences:
  - org/jobrunr/storylinedemo/creditcards/CreditCardStatementService.java?focus=L36-L42,L48-L54

tryIt: |
  Trigger the monthly statement generation recurring job on the Dashboard. Watch the batch create all individual 
  jobs, and then observe the summary job execute only after all succeed.

dashboardUrl: /dashboard/jobs

learnMore: https://www.jobrunr.io/en/documentation/pro/batches/
