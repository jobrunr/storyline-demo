title: "Metrics That Matter"
estimatedTime: PT4M

scenario: |
  DevOps needs to set up monitoring and alerting for background jobs:
  How many jobs are we processing per minute? What's the failure rate? 
  Are queues backing up?
  <br><br>
  They need metrics that feed into Prometheus and Grafana (or some competing observability platform).

challenge: |
  How do we expose job metrics for monitoring and alerting systems?

solution: |
  JobRunr Pro integrates with <strong>Micrometer</strong> to expose metrics:
  <br><br>
  <pre class="p-0 m-0">
  <code class="language-properties hljs">
  # In application.properties
  jobrunr.jobs.metrics.enabled=true
  jobrunr.jobs.metrics.micrometer-timers.enabled=true
  </code></pre>
  <br>
  Available metrics include:
  <ul>
    <li><code>jobrunr_jobs_by_state</code> — Jobs per state (ENQUEUED, PROCESSING, etc.)</li>
    <li><code>jobrunr_jobs_in_progress</code> — Jobs in progress</li>
    <li><code>jobrunr_jobs_runs_*</code> — Jobs execution times</li>
    <li><code>jobrunr_background_job_server_*</code> — Server health metrics</li>
  </ul>

codeReferences:
  - org/jobrunr/storylinedemo/StorylineDemoApplication.java

tryIt: |
  Open Prometheus and query JobRunr metrics:
  <br><br>
  <a href="http://localhost:9090/query?g0.expr=jobrunr_jobs_by_state" target="_blank">http://localhost:9090</a>
  <br><br>
  Try: <code>jobrunr_jobs_by_state</code> or <code>rate(jobrunr_jobs_in_progress_seconds_count[5m])</code>

dashboardUrl: http://localhost:9090/query?g0.expr=jobrunr_jobs_by_state

learnMore: https://www.jobrunr.io/en/documentation/pro/observability/

liveNotice: "Prometheus is not available in this live demo. Run the demo locally to explore the metrics."
