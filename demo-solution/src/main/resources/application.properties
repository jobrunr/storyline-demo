# ==========================================
# JobRunr Finance Demo - Application Properties
# ==========================================

# ----- Spring Boot Configuration -----
server.port=8080
spring.application.name=storyline-demo
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ----- Database Configuration -----
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.sql.init.mode=always

# ----- JobRunr Core Configuration -----
jobrunr.dashboard.enabled=true
jobrunr.dashboard.type=embedded
jobrunr.background-job-server.enabled=true
jobrunr.background-job-server.worker-count=4

# ----- Step 10: Priority Queues -----
# Payments (high-prio) are always processed before reports (low-prio)
jobrunr.queues.names=high-prio,low-prio
jobrunr.queues.default-queue-name=low-prio

# ----- Step 11: Dynamic Queues (Weighted Round-Robin) -----
# Enterprise customers get 5x more processing than Pro customers
# Uncomment the weighted-round-robin lines to see the difference
jobrunr.jobs.dynamic-queue.round-robin.label-prefix=customer:
jobrunr.jobs.dynamic-queue.round-robin.title=Customers
#jobrunr.jobs.dynamic-queue.weighted-round-robin.label-prefix=customer:
#jobrunr.jobs.dynamic-queue.weighted-round-robin.title=Customers
#jobrunr.jobs.dynamic-queue.weighted-round-robin.queues.ENTERPRISE=5
#jobrunr.jobs.dynamic-queue.weighted-round-robin.queues.PRO=1

# ----- Step 14: Server Tags -----
# This server handles national payments only
# Start a second server with tags=international for cross-border payments:
# ./gradlew :demo-solution:bootRun --args='--server.port=8081 --jobrunr.dashboard.enabled=false --jobrunr.background-job-server.tags=international'
jobrunr.background-job-server.tags=national

# ----- Step 15: Rate Limiters -----
# Limit concurrent exports to government API (max 3 at a time)
jobrunr.jobs.rate-limiter.concurrent-job-rate-limiter.government-api=3

# ----- Step 18: Metrics (Prometheus/Micrometer) -----
jobrunr.jobs.metrics.enabled=true
jobrunr.jobs.metrics.micrometer-timers.enabled=true

# ----- Step 19: Distributed Tracing (Jaeger) -----
# Uncomment these lines to enable distributed tracing
#management.tracing.sampling.probability=1.0
#management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
#jobrunr.jobs.metrics.otel-observability.enabled=true
#jobrunr.dashboard.integrations.observability.jaeger.root-url=http://localhost:16686/

