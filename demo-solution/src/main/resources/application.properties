# ==========================================
# JobRunr Finance Demo - Application Properties
# ==========================================

# ----- Spring Boot Configuration -----
server.port=8080
spring.application.name=storyline-demo
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ----- Database Configuration -----
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.sql.init.mode=always

# To keep JobRunr SSE connected longer than the default 30s
spring.mvc.async.request-timeout=1h

# ----- JobRunr Core Configuration -----
jobrunr.dashboard.enabled=true
jobrunr.dashboard.type=embedded
jobrunr.background-job-server.enabled=true

# ----- Step 10: Priority Queues -----
# Payments (High priority) are always processed before reports (Lower priority)
jobrunr.queues.names=High,Medium,Low
jobrunr.queues.default-queue-name=Medium

# ----- Step 11: Dynamic Queues (Weighted Round-Robin) -----
# Amex cardholders get 5x more processing than Mastercard
jobrunr.jobs.dynamic-queue.weighted-round-robin.label-prefix=cardType:
jobrunr.jobs.dynamic-queue.weighted-round-robin.title=Card Types
jobrunr.jobs.dynamic-queue.weighted-round-robin.queues.AMERICAN_EXPRESS=5
jobrunr.jobs.dynamic-queue.weighted-round-robin.queues.MASTERCARD=1

# ----- Step 14: Server Tags -----
# This server handles internal payments (JobRunr Finance) only
# Start a second server for external payments (PayPal/Stripe):
# ./gradlew :demo-solution:bootRun --args='--server.port=8081 --jobrunr.dashboard.enabled=false --jobrunr.background-job-server.tags=external'

# ----- Step 15: Rate Limiters -----
# PayPal: Concurrent rate limiter (max 5 concurrent)
jobrunr.jobs.rate-limiter.concurrent-job-rate-limiter.PAYPAL=5
# Stripe: Sliding window rate limiter (max 10 per minute)
jobrunr.jobs.rate-limiter.sliding-time-window-rate-limiter.STRIPE=10/PT1M
# Government reporting: Concurrent rate limiter (max 3 concurrent)
jobrunr.jobs.rate-limiter.concurrent-job-rate-limiter.REPORTING=3

# ----- Step 18: Metrics (Prometheus/Micrometer) -----
jobrunr.jobs.metrics.enabled=true
jobrunr.jobs.metrics.micrometer-timers.enabled=true

# ----- Step 19: Tracing (Jaeger/OpenTelemetry) -----
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.otlp.metrics.export.enabled=false
jobrunr.jobs.metrics.otel-observability.enabled=true
jobrunr.dashboard.integrations.observability.jaeger.root-url=http://localhost:16686/

